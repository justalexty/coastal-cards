<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coastal Witch Tarot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        #game-container {
            width: 100%;
            max-width: 1280px;
            aspect-ratio: 16/9;
            position: relative;
        }
        
        #game-canvas {
            width: 100%;
            height: 100%;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .loading-spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #b19cd9;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .info {
            margin-top: 20px;
            text-align: center;
            color: #888;
        }
        
        .controls {
            margin-top: 10px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            max-width: 600px;
        }
        
        .controls h3 {
            color: #b19cd9;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Loading Coastal Witch Tarot...</p>
            <p style="font-size: 12px; color: #666;">First load may take a moment</p>
        </div>
        <canvas id="game-canvas"></canvas>
    </div>
    
    <div class="info">
        <h1>Coastal Witch Tarot</h1>
        <p>A cozy game about making rent through tarot readings</p>
    </div>
    
    <div class="controls">
        <h3>Controls:</h3>
        <p><strong>WASD/Arrow Keys:</strong> Move around</p>
        <p><strong>E:</strong> Interact with objects</p>
        <p><strong>C:</strong> Toggle calendar</p>
        <p><strong>Mouse/Touch:</strong> Click buttons</p>
    </div>
    
    <script>
        // This will be replaced by Godot's exported HTML
        // For now, show placeholder
        window.addEventListener('load', () => {
            // In real export, Godot engine loads here
            console.log('Ready for Godot web export');
        });
    </script>
</body>
</html>
